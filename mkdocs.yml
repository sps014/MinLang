site_name: Dream
site_url: https://sps014.github.io/Dream/
repo_url: https://github.com/sps014/Dream
repo_name: sps014/Dream

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    scheme: slate
    primary: black
    accent: deep-purple
  features:
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.expand
    - toc.follow

hooks:
  - tooling/docs/dream_lexer.py

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      dedent_subsections: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Language:
    - Variables: language/variables.md
    - Operators: language/operators.md
    - Control Flow: language/control-flow.md
    - Functions: language/functions.md
    - Imports: language/imports.md
    - Generics: language/generics.md
    - Async/Await: language/async.md
  - Types:
    - Overview: language/types.md
    - string: stdlib/string.md
    - int: stdlib/int.md
    - float: stdlib/float.md
    - double: stdlib/double.md
    - char: stdlib/char.md
    - bool: stdlib/bool.md
    - Arrays: language/arrays.md
    - Enums: language/enums.md
    - Classes: language/classes.md
    - Interfaces: language/interfaces.md
    - Discriminated Unions: language/discriminated-unions.md
    - The object Type: language/objects.md
  - Standard Library:
    - Builtins: stdlib/builtins.md
    - Option: stdlib/option.md
    - Result: stdlib/result.md
    - List: stdlib/list.md
    - Map: stdlib/map.md
    - JSON: stdlib/json.md
    - File I/O: stdlib/file.md
    - HTTP: stdlib/http.md
    - Regex: stdlib/regex.md
  - Memory Model: memory.md
  - Interop:
    - JS Interop: language/interop.md
    - JS References: language/references.md
    - Callbacks: language/callbacks.md
