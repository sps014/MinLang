<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dream Regex Interop Demo</title>
    <style>
      body {
        font-family: "Inter", system-ui, sans-serif;
        background: #0e0e12;
        color: #e7e7ea;
        max-width: 720px;
        margin: 3rem auto;
        padding: 0 1.25rem;
      }
      h1 { font-weight: 700; }
      #log {
        background: #17171d;
        border: 1px solid #2a2a33;
        border-radius: 10px;
        padding: 1rem 1.25rem;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 0.9rem;
        white-space: pre-wrap;
        min-height: 4rem;
      }
      .muted { color: #8a8a96; }
    </style>
  </head>
  <body>
    <h1>Dream Regex via JS <code>RegExp</code></h1>
    <p class="muted">
      A Dream program using the stdlib <code>Regex</code> class, which is backed by JavaScript's
      <code>RegExp</code> through the <code>Dream</code> host module. Serve this folder over HTTP
      (e.g. <code>npx serve</code>) and open the page.
    </p>
    <div id="log"></div>

    <script type="module">
      import { run } from "../../runtime/dream.js";

      const logEl = document.getElementById("log");
      const append = (line) => {
        logEl.textContent += line + "\n";
      };
      const origLog = console.log.bind(console);
      console.log = (...a) => {
        append(a.join(" "));
        origLog(...a);
      };

      // No custom imports needed: regex helpers are built in to dream.js.
      await run("regex.wasm");
    </script>
  </body>
</html>
