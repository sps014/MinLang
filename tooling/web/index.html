<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dream Playground</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1e1e1e;
        color: #ddd;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        padding: 10px 16px;
        background: #252526;
        border-bottom: 1px solid #333;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      header h1 {
        font-size: 15px;
        font-weight: 600;
        margin: 0;
      }
      header .hint {
        font-size: 12px;
        color: #888;
      }
      #editor {
        flex: 1;
        min-height: 0;
      }
      #status {
        padding: 4px 16px;
        background: #007acc;
        color: #fff;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Dream Playground</h1>
        <span class="hint">Diagnostics, hover, completion, go-to-definition, references, and formatting &mdash; powered by the Dream compiler compiled to WebAssembly.</span>
      </header>
      <div id="editor"></div>
      <div id="status">Loading analyzer&hellip;</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
